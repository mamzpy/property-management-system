version: "3.9"

services:
  # =========================
  # Postgres Databases
  # =========================
  auth-postgres:
    image: postgres:15-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - property_network

  property-postgres:
   image: postgres:15-alpine
   container_name: property_postgres
   environment:
    POSTGRES_DB: property_db
    POSTGRES_USER: property_user
    POSTGRES_PASSWORD: property_pass
   ports:
    - "5434:5432"
   volumes:
    - property_pgdata:/var/lib/postgresql/data
   networks:
    - property_network


  maintenance-postgres:
    image: postgres:15-alpine
    container_name: maintenance_service_postgres
    environment:
      POSTGRES_DB: maintenance_db
      POSTGRES_USER: maintenance_user
      POSTGRES_PASSWORD: maintenance_pass
    ports:
      - "5435:5432"
    networks:
      - property_network

  booking-postgres:
    image: postgres:15-alpine
    container_name: booking_service_postgres
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5436:5432"
    networks:
      - property_network

  tenant-service-postgres:
    image: postgres:15-alpine
    container_name: tenant_service_postgres
    environment:
      POSTGRES_DB: tenant_db
      POSTGRES_USER: tenant_user
      POSTGRES_PASSWORD: tenant_pass
    ports:
      - "5437:5432"
    networks:
      - property_network

  # =========================
  # RabbitMQ
  # =========================
  property-rabbitmq:
    image: rabbitmq:3-management
    container_name: property_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - property_network

  # =========================
  # Redis
  # =========================
  property-redis:
    image: redis:7-alpine
    container_name: property_redis
    ports:
      - "6379:6379"
    networks:
      - property_network

  # =========================
  # AUTH SERVICE
  # =========================
  auth-service:
    build:
     context: .
     dockerfile: ./services/auth-service/Dockerfile
    container_name: auth_service
    restart: unless-stopped
    env_file:
    - ./services/auth-service/.env.docker
    ports:
    - "3001:3001"
    depends_on:
     auth-postgres:
      condition: service_started
    networks:
    - property_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================
  # PROPERTY SERVICE
  # =========================
  property-service:
    build:
      context: .
      dockerfile: ./services/property-service/Dockerfile
    env_file: ./services/property-service/.env.docker
    container_name: property_service
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      property-postgres:
        condition: service_started
      auth-service:
        condition: service_healthy
    networks:
      - property_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/properties/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================
  # MAINTENANCE SERVICE
  # =========================
  maintenance-service:
    build:
      context: .
      dockerfile: ./services/maintenance-service/Dockerfile
    env_file: ./services/maintenance-service/.env.docker
    container_name: maintenance_service
    restart: unless-stopped
    ports:
      - "3003:3003"
    
    depends_on:
      maintenance-postgres:
        condition: service_started
      auth-service:
        condition: service_healthy
    networks:
      - property_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/maintenance/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =========================
  # TENANT SERVICE
  # =========================
  tenant-service:
    build:
      context: .
      dockerfile: ./services/tenant-service/Dockerfile
    env_file: ./services/tenant-service/.env.docker
    container_name: tenant_service
    restart: unless-stopped
    ports:
      - "3004:3004"

    depends_on:
      tenant-service-postgres:
        condition: service_started
      auth-service:
        condition: service_healthy
    networks:
      - property_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================
  # BOOKING SERVICE
  # =========================
  booking-service:
    build:
      context: .
      dockerfile: ./services/booking-service/Dockerfile
    env_file: ./services/booking-service/.env.docker
    container_name: booking_service
    restart: unless-stopped
    ports:
      - "3005:3005"

    depends_on:
      booking-postgres:
        condition: service_started
      auth-service:
        condition: service_healthy
      property-redis:
        condition: service_started  
    networks:
      - property_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3005/bookings/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

 # =========================
  # API GATEWAY
  # =========================
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: property_api_gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./services/api-gateway/.env.docker
    depends_on:
      - auth-service
      - property-service
      - tenant-service
      - maintenance-service
      - booking-service
    networks:
      - property_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  property_network:
    driver: bridge

volumes:
  postgres_data:
  property_pgdata: